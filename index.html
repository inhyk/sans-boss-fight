<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sans Boss Fight</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <p class="eyebrow">UNDERTALE-inspired fan battle</p>
        <h1>Sans Boss Fight</h1>
        <p class="summary">
          방향키와 <span>WASD</span>로 움직이고, <span>Z</span> 또는 <span>Enter</span>로 선택합니다.
          파란 영혼 상태에서는 점프로 뼈를 넘을 수 있습니다.
        </p>
      </section>

      <section class="shell">
        <canvas id="game" width="960" height="540" aria-label="Sans boss fight game"></canvas>
      </section>

      <section class="notes">
        <div>
          <strong>조작</strong>
          <p>이동: 방향키 / WASD</p>
          <p>확인: Z / Enter</p>
          <p>점프: 위 / W</p>
          <p>음소거: M</p>
          <p>명령어: /</p>
        </div>
        <div>
          <strong>패턴 힌트</strong>
          <p>파란 뼈는 멈춰야 안전합니다.</p>
          <p>주황 뼈는 계속 움직여야 안전합니다.</p>
        </div>
      </section>
    </main>

    <script type="module" src="./src/game.js"></script>
  </body>
</html>
